plugins:
  authzen:
    path: "authzen"
    decision: "allow"
    # AuthZEN Search APIs (spec Section 8). Each field names a Rego rule in
    # the `authzen` package that returns the set of permitted entities for
    # a partial input. Omit a field to disable the corresponding endpoint.
    search:
      subject: "subject_search"
      resource: "resource_search"
      action: "action_search"
